
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Consistency">
    <title>Consistency Challenge</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            max-width: 430px;
            margin: 0 auto;
            padding: 20px 16px;
            padding-bottom: 100px;
        }

        /* Navigation */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            margin-bottom: 20px;
        }

        .nav-title {
            font-size: 20px;
            font-weight: 700;
        }

        .nav-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        /* Challenge Header */
        .challenge-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .challenge-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .challenge-progress {
            font-size: 15px;
            color: #8e8e93;
        }

        .challenge-objective {
            font-size: 13px;
            color: #636366;
            margin-top: 8px;
            font-style: italic;
        }

        /* Progress Bar */
        .progress-container {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 6px;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        /* Photo Grid */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
            border-radius: 16px;
            overflow: hidden;
        }

        .photo-tile {
            aspect-ratio: 1;
            background: #1c1c1e;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .photo-tile:active {
            transform: scale(0.95);
        }

        .photo-tile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .tile-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid #2c2c2e;
        }

        .tile-day-label {
            position: absolute;
            bottom: 6px;
            left: 6px;
            font-size: 10px;
            font-weight: 600;
            color: rgba(255,255,255,0.7);
            background: rgba(0,0,0,0.5);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .tile-empty .tile-day-label {
            position: static;
            background: none;
            color: #636366;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .tile-add-icon {
            font-size: 24px;
            color: #636366;
        }

        .tile-today {
            border: 2px solid #6366f1;
        }

        /* Challenge Management Page */
        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* Challenge List */
        .challenge-card {
            background: #1c1c1e;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .challenge-card:active {
            transform: scale(0.98);
        }

        .challenge-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .challenge-card-title {
            font-size: 17px;
            font-weight: 600;
        }

        .challenge-card-days {
            font-size: 13px;
            color: #8e8e93;
            margin-top: 4px;
        }

        .challenge-card-objective {
            font-size: 12px;
            color: #636366;
            margin-top: 6px;
        }

        .delete-btn {
            background: #ff3b30;
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
        }

        /* Create Challenge Form */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-size: 13px;
            color: #8e8e93;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: block;
        }

        .form-input {
            width: 100%;
            background: #1c1c1e;
            border: 1px solid #2c2c2e;
            border-radius: 12px;
            padding: 14px 16px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .form-input:focus {
            border-color: #6366f1;
        }

        .form-textarea {
            resize: none;
            height: 80px;
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            color: white;
            padding: 16px;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }

        .btn-primary:active {
            opacity: 0.8;
        }

        .btn-secondary {
            width: 100%;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 16px;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }

        /* Image Preview Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-close {
            position: absolute;
            top: 50px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
        }

        .modal-image {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 12px;
            object-fit: contain;
        }

        .modal-date {
            margin-top: 16px;
            font-size: 15px;
            color: #8e8e93;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-action-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
        }

        .modal-action-btn.danger {
            background: rgba(255, 59, 48, 0.2);
            color: #ff3b30;
        }

        /* Image Source Picker */
        .source-picker {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1c1c1e;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            padding-bottom: 40px;
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }

        .source-picker.active {
            display: block;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .source-picker-title {
            text-align: center;
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .source-option {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px;
            background: #2c2c2e;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            border: none;
            width: 100%;
            color: white;
            font-size: 16px;
        }

        .source-option:active {
            background: #3a3a3c;
        }

        .source-icon {
            font-size: 24px;
        }

        .source-picker-cancel {
            width: 100%;
            padding: 16px;
            background: #2c2c2e;
            border: none;
            color: #ff3b30;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .picker-backdrop {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }

        .picker-backdrop.active {
            display: block;
        }

        /* Confetti */
        .confetti-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 2000;
            pointer-events: none;
        }

        .confetti-container.active {
            display: block;
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            top: -10px;
            animation: confettiFall 3s ease-in forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* Celebration Modal */
        .celebration-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1500;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
        }

        .celebration-modal.active {
            display: flex;
        }

        .celebration-emoji {
            font-size: 80px;
            margin-bottom: 24px;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .celebration-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .celebration-subtitle {
            font-size: 16px;
            color: #8e8e93;
            margin-bottom: 32px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state-emoji {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .empty-state-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .empty-state-subtitle {
            font-size: 15px;
            color: #8e8e93;
            margin-bottom: 24px;
        }

        /* Tab Bar */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(28, 28, 30, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            gap: 60px;
            padding: 12px 0;
            padding-bottom: 28px;
            border-top: 1px solid #2c2c2e;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: #636366;
            cursor: pointer;
            font-size: 10px;
        }

        .tab-item.active {
            color: #6366f1;
        }

        .tab-icon {
            font-size: 24px;
        }

        /* Hidden file inputs */
        #cameraInput, #galleryInput {
            display: none;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Challenge View Page -->
        <div class="page active" id="challengeViewPage">
            <div class="nav-bar">
                <button class="nav-btn" onclick="showPage('managePage')">←</button>
                <span class="nav-title" id="viewTitle">Challenge</span>
                <div style="width:40px"></div>
            </div>
            <div class="challenge-header">
                <div class="challenge-name" id="viewChallengeName"></div>
                <div class="challenge-progress" id="viewProgress"></div>
                <div class="challenge-objective" id="viewObjective"></div>
            </div>
            <div class="progress-container">
                <div class="progress-fill" id="progressBar"></div>
            </div>
            <div class="photo-grid" id="photoGrid"></div>
        </div>

        <!-- Challenge Management Page -->
        <div class="page" id="managePage">
            <div class="nav-bar">
                <span class="nav-title">My Challenges</span>
                <button class="nav-btn" onclick="showPage('createPage')">+</button>
            </div>
            <div id="challengeList"></div>
            <div class="empty-state" id="emptyState" style="display:none;">
                <div class="empty-state-emoji">🎯</div>
                <div class="empty-state-title">No Challenges Yet</div>
                <div class="empty-state-subtitle">Create your first consistency challenge and start building habits!</div>
                <button class="btn-primary" onclick="showPage('createPage')">Create Challenge</button>
            </div>
        </div>

        <!-- Create Challenge Page -->
        <div class="page" id="createPage">
            <div class="nav-bar">
                <button class="nav-btn" onclick="showPage('managePage')">←</button>
                <span class="nav-title">New Challenge</span>
                <div style="width:40px"></div>
            </div>
            <div class="form-group">
                <label class="form-label">Challenge Name</label>
                <input type="text" class="form-input" id="challengeName" placeholder="e.g., 30 Days of Fitness">
            </div>
            <div class="form-group">
                <label class="form-label">Number of Days</label>
                <input type="number" class="form-input" id="challengeDays" placeholder="e.g., 30" min="1" max="365">
            </div>
            <div class="form-group">
                <label class="form-label">Objective</label>
                <textarea class="form-input form-textarea" id="challengeObjective" placeholder="What's the goal of this challenge?"></textarea>
            </div>
            <button class="btn-primary" onclick="createChallenge()">Create Challenge</button>
        </div>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar">
        <button class="tab-item active" id="tabChallenge" onclick="switchTab('challenge')">
            <span class="tab-icon">📸</span>
            <span>Challenge</span>
        </button>
        <button class="tab-item" id="tabManage" onclick="switchTab('manage')">
            <span class="tab-icon">📋</span>
            <span>Manage</span>
        </button>
    </div>

    <!-- Image Preview Modal -->
    <div class="modal-overlay" id="imageModal">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <img class="modal-image" id="modalImage" src="">
        <div class="modal-date" id="modalDate"></div>
        <div class="modal-actions">
            <button class="modal-action-btn" onclick="retakePhoto()">📷 Retake</button>
            <button class="modal-action-btn danger" onclick="deletePhoto()">🗑 Delete</button>
        </div>
    </div>

    <!-- Source Picker -->
    <div class="picker-backdrop" id="pickerBackdrop" onclick="closeSourcePicker()"></div>
    <div class="source-picker" id="sourcePicker">
        <div class="source-picker-title">Add Photo</div>
        <button class="source-option" onclick="openCamera()">
            <span class="source-icon">📷</span>
            <span>Take Photo</span>
        </button>
        <button class="source-option" onclick="openGallery()">
            <span class="source-icon">🖼️</span>
            <span>Choose from Library</span>
        </button>
        <button class="source-picker-cancel" onclick="closeSourcePicker()">Cancel</button>
    </div>

    <!-- Celebration Modal -->
    <div class="celebration-modal" id="celebrationModal">
        <div class="celebration-emoji">🎉</div>
        <div class="celebration-title">Congratulations!</div>
        <div class="celebration-subtitle" id="celebrationText">You completed the challenge!</div>
        <button class="btn-primary" onclick="startNewChallenge()">Start New Challenge</button>
        <button class="btn-secondary" onclick="closeCelebration()">View Challenge</button>
    </div>

    <!-- Confetti Container -->
    <div class="confetti-container" id="confettiContainer"></div>

    <!-- Hidden Inputs -->
    <input type="file" id="cameraInput" accept="image/*" capture="environment">
    <input type="file" id="galleryInput" accept="image/*">

    <script>
        // ===== STATE MANAGEMENT =====
        let challenges = JSON.parse(localStorage.getItem('challenges') || '[]');
        let currentChallengeId = localStorage.getItem('currentChallengeId') || null;
        let selectedDayIndex = null;

        // ===== PAGE NAVIGATION =====
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');

            if (pageId === 'managePage') {
                renderChallengeList();
                setActiveTab('manage');
            } else if (pageId === 'challengeViewPage') {
                renderChallengeView();
                setActiveTab('challenge');
            } else if (pageId === 'createPage') {
                setActiveTab('manage');
            }
        }

        function switchTab(tab) {
            if (tab === 'challenge') {
                if (currentChallengeId) {
                    showPage('challengeViewPage');
                } else if (challenges.length > 0) {
                    currentChallengeId = challenges[0].id;
                    localStorage.setItem('currentChallengeId', currentChallengeId);
                    showPage('challengeViewPage');
                } else {
                    showPage('managePage');
                }
            } else {
                showPage('managePage');
            }
        }

        function setActiveTab(tab) {
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            if (tab === 'challenge') {
                document.getElementById('tabChallenge').classList.add('active');
            } else {
                document.getElementById('tabManage').classList.add('active');
            }
        }

        // ===== CHALLENGE MANAGEMENT =====
        function createChallenge() {
            const name = document.getElementById('challengeName').value.trim();
            const days = parseInt(document.getElementById('challengeDays').value);
            const objective = document.getElementById('challengeObjective').value.trim();

            if (!name) { alert('Please enter a challenge name'); return; }
            if (!days || days < 1) { alert('Please enter a valid number of days'); return; }

            const challenge = {
                id: Date.now().toString(),
                name: name,
                days: days,
                objective: objective,
                photos: {},
                createdAt: new Date().toISOString()
            };

            challenges.push(challenge);
            saveChallenges();

            currentChallengeId = challenge.id;
            localStorage.setItem('currentChallengeId', currentChallengeId);

            // Clear form
            document.getElementById('challengeName').value = '';
            document.getElementById('challengeDays').value = '';
            document.getElementById('challengeObjective').value = '';

            showPage('challengeViewPage');
        }

        function deleteChallenge(id, event) {
            event.stopPropagation();
            if (confirm('Delete this challenge? This cannot be undone.')) {
                challenges = challenges.filter(c => c.id !== id);
                saveChallenges();
                if (currentChallengeId === id) {
                    currentChallengeId = challenges.length > 0 ? challenges[0].id : null;
                    localStorage.setItem('currentChallengeId', currentChallengeId || '');
                }
                renderChallengeList();
            }
        }

        function selectChallenge(id) {
            currentChallengeId = id;
            localStorage.setItem('currentChallengeId', id);
            showPage('challengeViewPage');
        }

        function saveChallenges() {
            localStorage.setItem('challenges', JSON.stringify(challenges));
        }

        function getCurrentChallenge() {
            return challenges.find(c => c.id === currentChallengeId);
        }

        // ===== RENDERING =====
        function renderChallengeList() {
            const list = document.getElementById('challengeList');
            const empty = document.getElementById('emptyState');

            if (challenges.length === 0) {
                list.innerHTML = '';
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';
            list.innerHTML = challenges.map(c => {
                const photoCount = Object.keys(c.photos).length;
                return `
                    <div class="challenge-card" onclick="selectChallenge('${c.id}')">
                        <div class="challenge-card-header">
                            <div>
                                <div class="challenge-card-title">${c.name}</div>
                                <div class="challenge-card-days">Day ${photoCount}/${c.days}</div>
                                ${c.objective ? `<div class="challenge-card-objective">${c.objective}</div>` : ''}
                            </div>
                            <button class="delete-btn" onclick="deleteChallenge('${c.id}', event)">✕</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderChallengeView() {
            const challenge = getCurrentChallenge();
            if (!challenge) {
                showPage('managePage');
                return;
            }

            const photoCount = Object.keys(challenge.photos).length;

            document.getElementById('viewChallengeName').textContent = challenge.name;
            document.getElementById('viewProgress').textContent = `Day ${photoCount}/${challenge.days}`;
            document.getElementById('viewObjective').textContent = challenge.objective || '';
            document.getElementById('viewTitle').textContent = `Day ${photoCount}/${challenge.days}`;

            const progressPercent = (photoCount / challenge.days) * 100;
            document.getElementById('progressBar').style.width = progressPercent + '%';

            const grid = document.getElementById('photoGrid');
            let html = '';

            for (let i = 0; i < challenge.days; i++) {
                const dayNum = i + 1;
                const photo = challenge.photos[i];
                const isNextEmpty = !photo && photoCount === i;

                if (photo) {
                    html += `
                        <div class="photo-tile" onclick="viewPhoto(${i})">
                            <img src="${photo.data}" alt="Day ${dayNum}">
                            <span class="tile-day-label">Day ${dayNum}</span>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="photo-tile tile-empty ${isNextEmpty ? 'tile-today' : ''}" 
                             onclick="${isNextEmpty ? `openSourcePicker(${i})` : ''}">
                            <span class="tile-day-label">Day ${dayNum}</span>
                            ${isNextEmpty ? '<span class="tile-add-icon">+</span>' : ''}
                        </div>
                    `;
                }
            }

            grid.innerHTML = html;
        }

        // ===== PHOTO HANDLING =====
        function openSourcePicker(dayIndex) {
            selectedDayIndex = dayIndex;
            document.getElementById('sourcePicker').classList.add('active');
            document.getElementById('pickerBackdrop').classList.add('active');
        }

        function closeSourcePicker() {
            document.getElementById('sourcePicker').classList.remove('active');
            document.getElementById('pickerBackdrop').classList.remove('active');
        }

        function openCamera() {
            closeSourcePicker();
            document.getElementById('cameraInput').click();
        }

        function openGallery() {
            closeSourcePicker();
            document.getElementById('galleryInput').click();
        }

        document.getElementById('cameraInput').addEventListener('change', handleImageSelect);
        document.getElementById('galleryInput').addEventListener('change', handleImageSelect);

        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                // Compress image before storing
                compressImage(e.target.result, function(compressedData) {
                    const challenge = getCurrentChallenge();
                    challenge.photos[selectedDayIndex] = {
                        data: compressedData,
                        date: new Date().toISOString()
                    };
                    saveChallenges();

                    // Check if challenge is complete
                    const photoCount = Object.keys(challenge.photos).length;
                    if (photoCount >= challenge.days) {
                        showCelebration(challenge);
                    }

                    renderChallengeView();
                });
            };
            reader.readAsDataURL(file);
            event.target.value = '';
        }

        function compressImage(dataUrl, callback) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const maxSize = 800;
                let width = img.width;
                let height = img.height;

                if (width > height && width > maxSize) {
                    height = (height * maxSize) / width;
                    width = maxSize;
                } else if (height > maxSize) {
                    width = (width * maxSize) / height;
                    height = maxSize;
                }

                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                callback(canvas.toDataURL('image/jpeg', 0.7));
            };
            img.src = dataUrl;
        }

        // ===== IMAGE MODAL =====
        function viewPhoto(dayIndex) {
            const challenge = getCurrentChallenge();
            const photo = challenge.photos[dayIndex];
            if (!photo) return;

            selectedDayIndex = dayIndex;
            document.getElementById('modalImage').src = photo.data;
            document.getElementById('modalDate').textContent = 
                `Day ${dayIndex + 1} • ${new Date(photo.date).toLocaleDateString('en-US', { 
                    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
                })}`;
            document.getElementById('imageModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('imageModal').classList.remove('active');
        }

        function deletePhoto() {
            if (confirm('Delete this photo?')) {
                const challenge = getCurrentChallenge();
                delete challenge.photos[selectedDayIndex];
                // Reindex photos to fill gaps
                reindexPhotos(challenge);
                saveChallenges();
                closeModal();
                renderChallengeView();
            }
        }

        function retakePhoto() {
            closeModal();
            openSourcePicker(selectedDayIndex);
        }

        function reindexPhotos(challenge) {
            const photos = {};
            const sortedKeys = Object.keys(challenge.photos).map(Number).sort((a, b) => a - b);
            sortedKeys.forEach((key, index) => {
                photos[index] = challenge.photos[key];
            });
            challenge.photos = photos;
        }

        // ===== CELEBRATION =====
        function showCelebration(challenge) {
            document.getElementById('celebrationText').textContent = 
                `You completed "${challenge.name}" — ${challenge.days} days of consistency! 🏆`;
            document.getElementById('celebrationModal').classList.add('active');
            launchConfetti();
        }

        function closeCelebration() {
            document.getElementById('celebrationModal').classList.remove('active');
            document.getElementById('confettiContainer').classList.remove('active');
        }

        function startNewChallenge() {
            closeCelebration();
            showPage('createPage');
        }

        function launchConfetti() {
            const container = document.getElementById('confettiContainer');
            container.classList.add('active');
            container.innerHTML = '';

            const colors = ['#ff3b30', '#ff9500', '#ffcc00', '#34c759', '#007aff', '#5856d6', '#af52de', '#ff2d55'];

            for (let i = 0; i < 150; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + '%';
                piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                piece.style.animationDelay = Math.random() * 2 + 's';
                piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
                piece.style.width = (Math.random() * 8 + 5) + 'px';
                piece.style.height = (Math.random() * 8 + 5) + 'px';
                piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                container.appendChild(piece);
            }

            setTimeout(() => {
                container.classList.remove('active');
            }, 5000);
        }

        // ===== INITIALIZATION =====
        function init() {
            if (currentChallengeId && challenges.find(c => c.id === currentChallengeId)) {
                showPage('challengeViewPage');
            } else if (challenges.length > 0) {
                currentChallengeId = challenges[0].id;
                localStorage.setItem('currentChallengeId', currentChallengeId);
                showPage('challengeViewPage');
            } else {
                showPage('managePage');
            }
        }

        init();
    </script>
</body>
</html>
